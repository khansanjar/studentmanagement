<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Update Student - Student Management System</title>
<script src="https://cdn.tailwindcss.com"></script>
<link
	href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css"
	rel="stylesheet">
</head>

<body class="bg-slate-50 font-sans antialiased">

	<div class="flex min-h-screen overflow-hidden" id="wrapper">

		<div
			class="w-64 bg-slate-900 text-white flex flex-col transition-all duration-300 ease-in-out shrink-0"
			id="sidebar-wrapper">
			<div
				class="p-5 text-lg font-bold border-b border-slate-800 flex items-center tracking-tight">
				<i class="bi bi-mortarboard-fill me-2 text-blue-500"></i> SMS Admin
			</div>
			<div class="flex flex-col flex-grow p-3 space-y-1">
				<a th:href="@{/dashboard}"
					class="flex items-center space-x-3 px-4 py-2.5 rounded-xl text-slate-400 hover:bg-slate-800 hover:text-white transition duration-150">
					<i class="bi bi-speedometer2"></i> <span>Dashboard</span>
				</a> <a th:href="@{/course/list}"
					class="flex items-center space-x-3 px-4 py-2.5 rounded-xl text-slate-400 hover:bg-slate-800 hover:text-white transition duration-150">
					<i class="bi bi-book"></i> <span>Courses</span>
				</a> <a th:href="@{/student/list}"
					class="flex items-center space-x-3 px-4 py-2.5 rounded-xl bg-blue-600 text-white font-medium transition duration-150">
					<i class="bi bi-people"></i> <span>Students</span>
				</a> <a th:href="@{/enroll}"
					class="flex items-center space-x-3 px-4 py-2.5 rounded-xl text-slate-400 hover:bg-slate-800 hover:text-white transition duration-150">
					<i class="bi bi-check2-square"></i> <span>Enroll to Course</span>
				</a> <a th:href="@{/login}"
					class="flex items-center space-x-3 px-4 py-2.5 rounded-xl text-slate-400 hover:bg-red-950/40 hover:text-red-400 transition duration-150 mt-auto border-t border-slate-800 pt-4">
					<i class="bi bi-box-arrow-right"></i> <span>Logout</span>
				</a>
			</div>
		</div>

		<div class="flex-1 flex flex-col min-w-0" id="page-content-wrapper">

			<nav
				class="bg-white border-b border-slate-200 px-6 py-3 flex items-center justify-between shadow-sm">
				<div class="flex items-center">
					<button
						class="text-slate-600 p-2 rounded-xl hover:bg-slate-100 border border-slate-200 transition duration-150 focus:outline-none"
						id="sidebarToggle">
						<i class="bi bi-list text-xl"></i>
					</button>
				</div>
				<div class="flex items-center space-x-4">
					<div class="relative group">
						<a
							class="flex items-center space-x-2 text-slate-700 hover:text-slate-900 cursor-pointer py-1"
							id="navbarDropdown"> <i
							class="bi bi-person-circle text-xl text-slate-400"></i> <span
							class="font-semibold text-sm">Admin User</span>
						</a>
						<div
							class="absolute right-0 w-48 bg-white border border-slate-200 rounded-xl shadow-lg py-1 hidden group-hover:block z-50 transition duration-150">
							<a
								class="block px-4 py-2 text-sm text-slate-700 hover:bg-slate-50"
								href="#">Profile</a> <a
								class="block px-4 py-2 text-sm text-slate-700 hover:bg-slate-50"
								href="#">Settings</a>
							<div class="border-t border-slate-100 my-1"></div>
							<a class="block px-4 py-2 text-sm text-red-600 hover:bg-red-50"
								th:href="@{/login}">Logout</a>
						</div>
					</div>
				</div>
			</nav>

			<div class="flex-grow p-6 overflow-y-auto">

				<div th:if="${message}" class="mb-4 p-4 rounded-xl bg-green-50 border border-green-200 text-green-700 text-sm font-semibold flex items-center">
					<i class="bi bi-check-circle-fill me-2 text-green-500 text-base"></i>
					<span th:text="${message}"></span>
				</div>
				
				<div th:if="${errorMessage}" class="mb-4 p-4 rounded-xl bg-red-50 border border-red-200 text-red-700 text-sm font-semibold flex items-center">
					<i class="bi bi-exclamation-triangle-fill me-2 text-red-500 text-base"></i>
					<span th:text="${errorMessage}"></span>
				</div>

				<div
					class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4 mb-6">
					<h2 class="text-2xl font-bold text-slate-800 tracking-tight">Add
						New Student</h2>
					<a th:href="@{/student/list}"
						class="inline-flex items-center justify-center bg-slate-200 hover:bg-slate-300 text-slate-700 font-semibold text-sm px-4 py-2 rounded-xl transition duration-150">
						<i class="bi bi-arrow-left me-1.5"></i> Back to List
					</a>
				</div>

				<div
					class="bg-white border border-slate-200 rounded-2xl shadow-sm overflow-hidden mb-6">
					<div
						class="bg-slate-50 border-b border-slate-200 px-5 py-4 font-semibold text-sm text-slate-700 flex items-center">
						<i class="bi bi-person-plus mr-2 text-blue-500"></i> Student
						Details
					</div>
					<div class="p-6">
						<form th:action="@{/student/{id}/update(id=${studentDTO.id})}" th:object="${studentDTO}"
							method="POST">

							<div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-5">
								<div>
									<label for="firstName"
										class="block text-sm font-semibold text-slate-700 mb-2">First
										Name</label> 
									<input type="text" th:field="*{firstName}"
										class="w-full px-4 py-2.5 rounded-xl border border-slate-200 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition text-sm text-slate-800 placeholder-slate-400 bg-white"
										id="firstName" placeholder="e.g. John" >
									<div class="text-red-500 text-xs mt-1"
										th:if="${#fields.hasErrors('firstName')}"
										th:errors="*{firstName}"></div>
								</div>

								<div>
									<label for="lastName"
										class="block text-sm font-semibold text-slate-700 mb-2">Last
										Name</label> 
									<input type="text" th:field="*{lastName}"
										class="w-full px-4 py-2.5 rounded-xl border border-slate-200 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition text-sm text-slate-800 placeholder-slate-400 bg-white"
										id="lastName" placeholder="e.g. Doe" >
									<div class="text-red-500 text-xs mt-1"
										th:if="${#fields.hasErrors('lastName')}"
										th:errors="*{lastName}"></div>
								</div>
							</div>

							<div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-5">
								<div>
									<label for="email"
										class="block text-sm font-semibold text-slate-700 mb-2">Email
										Address</label> 
									<input type="email" th:field="*{email}"
										class="w-full px-4 py-2.5 rounded-xl border border-slate-200 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition text-sm text-slate-800 placeholder-slate-400 bg-white"
										id="email" placeholder="e.g. john.doe@example.com" >
									<div class="text-red-500 text-xs mt-1"
										th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
								</div>

								

							<div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-5">
								<div>
									<label for="phuneNumber"
										class="block text-sm font-semibold text-slate-700 mb-2">Phone Number</label> 
									<input type="text" th:field="*{phuneNumber}"
										class="w-full px-4 py-2.5 rounded-xl border border-slate-200 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition text-sm text-slate-800 placeholder-slate-400 bg-white"
										id="phuneNumber" placeholder="e.g. 12454564554">
								</div>
								<div>
									<label for="address"
										class="block text-sm font-semibold text-slate-700 mb-2">Address</label> 
									<input type="text" th:field="*{address}"
										class="w-full px-4 py-2.5 rounded-xl border border-slate-200 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition text-sm text-slate-800 placeholder-slate-400 bg-white"
										id="address" placeholder="e.g. House 123, Street 4">
								</div>
							</div>

							

							<div
								class="flex items-center justify-end space-x-3 border-t border-slate-100 pt-5">
								<button type="reset"
									class="px-5 py-2.5 rounded-xl bg-slate-100 hover:bg-slate-200 text-slate-600 text-sm font-semibold transition">Reset</button>
								<button type="submit"
									class="inline-flex items-center px-5 py-2.5 rounded-xl bg-blue-600 hover:bg-blue-700 text-white text-sm font-semibold shadow-md shadow-blue-500/10 transition">
									<i class="bi bi-save me-1.5"></i> Update Student
								</button>
							</div>
						</form>
					</div>
				</div>
			</div>
		</div>
	</div>

	<script>
        window.addEventListener('DOMContentLoaded', event => {
            const sidebarToggle = document.body.querySelector('#sidebarToggle');
            if (sidebarToggle) {
                sidebarToggle.addEventListener('click', event => {
                    event.preventDefault();
                    const sidebar = document.getElementById('sidebar-wrapper');
                    sidebar.classList.toggle('-ml-64'); 
                });
            }
        });
    </script>
</body>

</html>
