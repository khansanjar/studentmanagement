<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Student Management System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body class="bg-slate-50 flex items-center justify-center min-h-screen p-4 font-sans">

    <div class="w-full max-w-[420px] bg-white rounded-2xl shadow-xl shadow-blue-900/5 border border-slate-100 overflow-hidden">
        <div class="bg-blue-600 text-center text-white py-6 px-4">
            <h2 class="text-3xl font-bold mb-1 tracking-tight"><i class="bi bi-mortarboard-fill me-2"></i>SMS</h2>
            <p class="mb-0 opacity-80 text-sm font-medium">Student Management System</p>
        </div>
        
        <div class="p-6 md:p-8">
            <h4 class="text-center mb-6 text-xl font-bold text-slate-800 tracking-tight">Welcome Back</h4>
            
            <form th:action="@{/login}" method="POST">
                
                <div class="mb-4">
                    <label for="username" class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-2">username</label>
                    <div class="flex rounded-lg shadow-sm border border-slate-200 focus-within:border-blue-500 focus-within:ring-1 focus-within:ring-blue-500 overflow-hidden transition-colors duration-200">
                        <span class="bg-slate-50 px-3 flex items-center border-r border-slate-100">
                            <i class="bi bi-envelope text-slate-400"></i>
                        </span>
                        <input type="text" class="w-full px-3 py-2.5 text-slate-700 placeholder-slate-400 focus:outline-none text-sm bg-white" id="username" name="username"
                            placeholder="Enter user name" required>
                    </div>
                </div>
                
                <div class="mb-6">
                    <label for="password" class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-2" >PASSWORD</label>
                    <div class="flex rounded-lg shadow-sm border border-slate-200 focus-within:border-blue-500 focus-within:ring-1 focus-within:ring-blue-500 overflow-hidden transition-colors duration-200">
                        <span class="bg-slate-50 px-3 flex items-center border-r border-slate-100">
                            <i class="bi bi-lock text-slate-400"></i>
                        </span>
                        <input type="password" class="w-full px-3 py-2.5 text-slate-700 placeholder-slate-400 focus:outline-none text-sm bg-white" id="password" name="password"
                            placeholder="Enter your password" required>
                    </div>
                </div>
                
                <div class="w-full">
                    <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 active:bg-blue-800 text-white font-semibold py-2.5 px-4 rounded-lg transition duration-200 text-base shadow-md shadow-blue-500/10 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2">
                        Login
                    </button>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
