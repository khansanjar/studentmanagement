<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Students - Student Management System</title>
<script src="https://cdn.tailwindcss.com"></script>
<link
	href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css"
	rel="stylesheet">
</head>

<body class="bg-slate-50 font-sans antialiased">

	<div class="flex min-h-screen overflow-hidden" id="wrapper">

		<div
			class="w-64 bg-slate-900 text-white flex flex-col transition-all duration-300 ease-in-out shrink-0"
			id="sidebar-wrapper">
			<div
				class="p-5 text-lg font-bold border-b border-slate-800 flex items-center tracking-tight">
				<i class="bi bi-mortarboard-fill me-2 text-blue-500"></i> SMS Admin
			</div>
			<div class="flex flex-col flex-grow p-3 space-y-1">
				<a th:href="@{/dashboard}"
					class="flex items-center space-x-3 px-4 py-2.5 rounded-xl text-slate-400 hover:bg-slate-800 hover:text-white transition duration-150">
					<i class="bi bi-speedometer2"></i> <span>Dashboard</span>
				</a> <a th:href="@{/course/list}"
					class="flex items-center space-x-3 px-4 py-2.5 rounded-xl text-slate-400 hover:bg-slate-800 hover:text-white transition duration-150">
					<i class="bi bi-book"></i> <span>Courses</span>
				</a> <a th:href="@{/student/list}"
					class="flex items-center space-x-3 px-4 py-2.5 rounded-xl bg-blue-600 text-white font-medium transition duration-150">
					<i class="bi bi-people"></i> <span>Students</span>
				</a> <a th:href="@{/enroll}"
					class="flex items-center space-x-3 px-4 py-2.5 rounded-xl text-slate-400 hover:bg-slate-800 hover:text-white transition duration-150">
					<i class="bi bi-check2-square"></i> <span>Enroll to Course</span>
				</a> <a th:href="@{/login}"
					class="flex items-center space-x-3 px-4 py-2.5 rounded-xl text-slate-400 hover:bg-red-950/40 hover:text-red-400 transition duration-150 mt-auto border-t border-slate-800 pt-4">
					<i class="bi bi-box-arrow-right"></i> <span>Logout</span>
				</a>
			</div>
		</div>

		<div class="flex-1 flex flex-col min-w-0" id="page-content-wrapper">

			<nav
				class="bg-white border-b border-slate-200 px-6 py-3 flex items-center justify-between shadow-sm">
				<div class="flex items-center">
					<button
						class="text-slate-600 p-2 rounded-xl hover:bg-slate-100 border border-slate-200 transition duration-150 focus:outline-none"
						id="sidebarToggle">
						<i class="bi bi-list text-xl"></i>
					</button>
				</div>
				<div class="flex items-center space-x-4">
					<div class="relative group">
						<a
							class="flex items-center space-x-2 text-slate-700 hover:text-slate-900 cursor-pointer py-1"
							id="navbarDropdown"> <i
							class="bi bi-person-circle text-xl text-slate-400"></i> <span
							class="font-semibold text-sm">Admin User</span>
						</a>
						<div
							class="absolute right-0 w-48 bg-white border border-slate-200 rounded-xl shadow-lg py-1 hidden group-hover:block z-50 transition duration-150">
							<a
								class="block px-4 py-2 text-sm text-slate-700 hover:bg-slate-50"
								href="#">Profile</a> <a
								class="block px-4 py-2 text-sm text-slate-700 hover:bg-slate-50"
								href="#">Settings</a>
							<div class="border-t border-slate-100 my-1"></div>
							<a class="block px-4 py-2 text-sm text-red-600 hover:bg-red-50"
								th:href="@{/login}">Logout</a>
						</div>
					</div>
				</div>
			</nav>

			<div class="flex-grow p-6 overflow-y-auto">

				<div th:if="${message}"
					class="mb-5 p-4 rounded-xl bg-green-50 border border-green-200 text-green-700 text-sm font-semibold flex items-center shadow-sm transition-all duration-300">
					<i class="bi bi-check-circle-fill me-2 text-green-500 text-lg"></i>
					<span th:text="${message}"></span>
				</div>

				<div
					class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4 mb-6">
					<h2 class="text-2xl font-bold text-slate-800 tracking-tight">Students</h2>
					<a th:href="@{/student/new}"
						class="inline-flex items-center justify-center bg-blue-600 hover:bg-blue-700 text-white font-semibold text-sm px-4 py-2.5 rounded-xl shadow-md shadow-blue-500/10 transition duration-150">
						<i class="bi bi-plus-lg me-1.5"></i> Add New Student
					</a>
				</div>

				<div
					class="bg-white border border-slate-200 rounded-2xl shadow-sm overflow-hidden mb-6">
					<div
						class="bg-slate-50 border-b border-slate-200 px-5 py-4 font-semibold text-sm text-slate-700 flex items-center">
						<i class="bi bi-table mr-2 text-blue-500"></i> Student List
					</div>

					<div class="p-0">
						<div class="overflow-x-auto">
							<table class="w-full text-left border-collapse">
								<thead>
									<tr
										class="border-b border-slate-200 bg-slate-50/70 text-slate-600 text-xs uppercase font-bold tracking-wider">
										<th class="px-6 py-3.5">ID</th>
										<th class="px-6 py-3.5">Name</th>
										<th class="px-6 py-3.5">Email</th>
										<th class="px-6 py-3.5">Phone</th>
										<th class="px-6 py-3.5 text-right">Actions</th>
									</tr>
								</thead>
								<tbody class="divide-y divide-slate-100 text-sm text-slate-700">

									<tr th:each="student : ${student.content}"
										class="hover:bg-slate-50/80 transition duration-100">

										<td class="px-6 py-4 font-medium text-slate-500"
											th:text="${'#' + student.id}">#STU001</td>

										<td class="px-6 py-4 font-semibold text-slate-900"
											th:text="${student.firstName + ' ' + student.lastName}">John
											Doe</td>

										<td class="px-6 py-4 text-slate-600"
											th:text="${student.email}">john.doe@example.com</td>

										<td class="px-6 py-4 text-slate-600 font-mono"
											th:text="${student.phuneNumber != null ? student.phuneNumber : '-'}">12454564554</td>

										<td class="px-6 py-4 text-right space-x-1 whitespace-nowrap">
											<a th:href="@{/student/{id}(id=${student.id})}"
											class="inline-flex items-center justify-center h-8 w-8 rounded-lg bg-blue-50 text-blue-600 hover:bg-blue-100 transition"
											title="View"> <i class="bi bi-eye"></i>
										</a> <a th:href="@{/student/{id}/edit(id=${student.id})}"
											class="inline-flex items-center justify-center h-8 w-8 rounded-lg bg-amber-50 text-amber-600 hover:bg-amber-100 transition"
											title="Edit"> <i class="bi bi-pencil"></i>
										</a>
										</td>
									</tr>

									<tr th:if="${student.totalPages == 0}">
										<td colspan="5" class="px-6 py-10 text-center text-slate-400">
											<i class="bi bi-people text-3xl block mb-2"></i> No active
											students found in the database.
										</td>
									</tr>

								</tbody>
							</table>
						</div>
					</div>

					<div
						class="px-6 py-4 border-t border-slate-200 bg-slate-50/50 flex items-center justify-between"
						th:if="${student != null and student.totalPages > 1}">

						<!-- Page Info -->
						<div class="text-sm text-slate-600">
							Page <span th:text="${student.number + 1}"></span> of <span
								th:text="${student.totalPages}"></span>
						</div>

						<!-- Pagination -->
						<nav>
							<ul class="inline-flex items-center gap-1 text-sm">

								<!-- Previous Button -->
								<li><a
									th:href="@{/student/list(page=${student.number - 1})}"
									th:classappend="${!student.hasPrevious()} ? 'pointer-events-none opacity-40' : ''"
									class="px-3 py-2 rounded-lg border bg-white text-slate-500 hover:bg-slate-50">
										Previous </a></li>

								<!-- Page Numbers -->
								<li
									th:each="i : ${#numbers.sequence(0, student.totalPages - 1)}">
									<a th:href="@{/student/list(page=${i})}" th:text="${i + 1}"
									th:classappend="${student.number == i} 
                        ? 'bg-blue-600 text-white font-semibold' 
                        : 'bg-white text-slate-600 hover:bg-slate-50'"
									class="px-3 py-2 rounded-lg border"> </a>
								</li>

								<!-- Next Button -->
								<li><a
									th:href="@{/student/list(page=${student.number + 1})}"
									th:classappend="${!student.hasNext()} ? 'pointer-events-none opacity-40' : ''"
									class="px-3 py-2 rounded-lg border bg-white text-slate-500 hover:bg-slate-50">
										Next </a></li>

							</ul>
						</nav>
					</div>
				</div>
			</div>
		</div>

		<script>
        window.addEventListener('DOMContentLoaded', event => {
            const sidebarToggle = document.body.querySelector('#sidebarToggle');
            if (sidebarToggle) {
                sidebarToggle.addEventListener('click', event => {
                    event.preventDefault();
                    const sidebar = document.getElementById('sidebar-wrapper');
                    sidebar.classList.toggle('-ml-64'); 
                });
            }
        });
    </script>
</body>

</html>
